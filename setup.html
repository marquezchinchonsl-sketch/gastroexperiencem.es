<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configuración inicial — GastroExperience</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0d0d0d;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f5f0e8;
    }
    .setup-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }
    .setup-card .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 600;
      color: #c9a84c;
      margin-bottom: 8px;
      letter-spacing: 0.05em;
    }
    .setup-card h1 {
      font-size: 1.2rem;
      font-weight: 500;
      color: #f5f0e8;
      margin-bottom: 8px;
    }
    .setup-card p {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .form-group {
      margin-bottom: 16px;
      text-align: left;
    }
    .form-group label {
      display: block;
      font-size: 0.75rem;
      color: #888;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #f5f0e8;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #c9a84c;
    }
    .form-group small {
      display: block;
      margin-top: 6px;
      font-size: 0.72rem;
      color: #666;
    }
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: #c9a84c;
      color: #0d0d0d;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .submit-btn:hover { background: #d4b45a; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg {
      background: #2a1a1a;
      border: 1px solid #5a2a2a;
      color: #e57373;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
    }
    .spinner { display: inline-block; margin-right: 8px; }
    .check-icon { color: #c9a84c; margin-right: 6px; }
  </style>
</head>
<body>

<div class="setup-card">
  <div class="logo">GastroExperience</div>
  <h1>Configuración inicial</h1>
  <p>Esta es la primera vez que accedes al panel. Crea tu cuenta de acceso para continuar.</p>

  <div id="error-box" class="error-msg"></div>

  <form id="setup-form">
    <div class="form-group">
      <label for="setup-email">Email de acceso</label>
      <input type="email" id="setup-email" placeholder="tu@restaurante.com" required>
      <small>Este será tu usuario para acceder al panel.</small>
    </div>
    <div class="form-group">
      <label for="setup-password">Contraseña</label>
      <input type="password" id="setup-password" placeholder="Mínimo 8 caracteres" required minlength="8">
    </div>
    <div class="form-group">
      <label for="setup-password2">Repite la contraseña</label>
      <input type="password" id="setup-password2" placeholder="Repite la contraseña" required minlength="8">
    </div>
    <button type="submit" class="submit-btn" id="submit-btn">
      <i class="fas fa-rocket"></i> Crear cuenta y continuar
    </button>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
const { supabase } = window.supabase ?? {};
const db = supabase ? supabase.createClient(APP_CONFIG.supabaseUrl, APP_CONFIG.supabaseKey) : null;

// Si ya hay sesión de Auth, redirigir al admin
(async () => {
  if (!db) return;
  const { data: { session } } = await db.auth.getSession();
  if (session) {
    window.location.href = '/admin.html';
    return;
  }
  // Si ya hay password en settings (setup legacy hecho), redirigir
  const { data } = await db.from('settings')
    .select('value')
    .eq('restaurant_id', APP_CONFIG.restaurantId)
    .eq('key', 'admin_password')
    .maybeSingle();
  if (data) {
    window.location.href = '/admin.html';
  }
})();

document.getElementById('setup-form').onsubmit = async (e) => {
  e.preventDefault();
  if (!db) {
    alert('Error: No se pudo conectar con Supabase.'); return;
  }
  const errorBox = document.getElementById('error-box');
  const btn = document.getElementById('submit-btn');
  const pass = document.getElementById('setup-password').value.trim();
  const pass2 = document.getElementById('setup-password2').value.trim();
  const email = document.getElementById('setup-email').value.trim();

  errorBox.style.display = 'none';

  if (pass !== pass2) {
    errorBox.textContent = 'Las contraseñas no coinciden.';
    errorBox.style.display = 'block';
    return;
  }
  if (pass.length < 8) {
    errorBox.textContent = 'La contraseña debe tener al menos 8 caracteres.';
    errorBox.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin spinner"></i> Creando cuenta...';

  try {
    // 1. Crear usuario en Supabase Auth con restaurant_id como metadata
    const { data: authData, error: signUpErr } = await db.auth.signUp({
      email,
      password: pass,
      options: {
        data: {
          restaurant_id: APP_CONFIG.restaurantId
        }
      }
    });
    if (signUpErr) throw signUpErr;

    // 2. Guardar restaurant_id en settings
    const { error: ridErr } = await db.from('settings').upsert({
      restaurant_id: APP_CONFIG.restaurantId,
      key: 'restaurant_id',
      value: APP_CONFIG.restaurantId
    }, { onConflict: 'restaurant_id,key' });
    if (ridErr) throw ridErr;

    // 3. Si el signup creó sesión automáticamente, usar esa sesión
    if (authData.session) {
      await db.auth.setSession(authData.session);
    }

    btn.innerHTML = '<i class="fas fa-check check-icon"></i> ¡Cuenta creada! Redirigiendo...';
    setTimeout(() => { window.location.href = '/admin.html'; }, 800);
  } catch (err) {
    errorBox.textContent = 'Error: ' + (err.message || 'No se pudo crear la cuenta.');
    errorBox.style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-rocket"></i> Crear cuenta y continuar';
  }
};
</script>
</body>
</html>
