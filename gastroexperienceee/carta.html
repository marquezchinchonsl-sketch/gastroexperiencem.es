<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carta</title>
  <meta name="theme-color" content="#f8f6f2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="menu-items.css">
</head>
<body>

  <header class="menu-header">
    <a href="index.html" class="nav-back" aria-label="Volver a la carta">
      <i class="fas fa-arrow-left" aria-hidden="true"></i> Carta
    </a>
    <div class="header-logo">
      <img src="images/logo.png" alt="Logo" id="page-logo" height="44">
    </div>
  </header>
  
  <div class="categories-bar-wrapper">
    <nav class="categories-nav" id="categories-nav">
      <!-- Inyectado por JS -->
    </nav>
  </div>

  <div class="section-intro">
    <h1 id="page-title">Carta</h1>
    <p class="category-subtitle" id="page-subtitle"></p>
    <div class="divider" aria-hidden="true"><span></span><i class="fas fa-circle"></i><span></span></div>
    
  </div>

  <main class="menu-content" id="menu-content">
    <!-- Loader -->
    <div id="menu-loader" style="display:flex;flex-direction:column;gap:14px;padding:8px 0;">
      <div style="height:72px;border-radius:12px;background:linear-gradient(90deg,#f3f0eb 25%,#edeae4 50%,#f3f0eb 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;"></div>
      <div style="height:72px;border-radius:12px;background:linear-gradient(90deg,#f3f0eb 25%,#edeae4 50%,#f3f0eb 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;"></div>
      <div style="height:72px;border-radius:12px;background:linear-gradient(90deg,#f3f0eb 25%,#edeae4 50%,#f3f0eb 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;"></div>
    </div>
    <style>@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}</style>
    <div class="no-results" id="no-results">
      <i class="fas fa-search" aria-hidden="true"></i>
      <p>No se encontraron resultados</p>
    </div>
  </main>

  <footer class="menu-footer" id="menu-footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script>
    // -- CONFIGURACIÓN DE ESTA PÁGINA --------------------------
    const urlParams = new URLSearchParams(window.location.search);
    const PAGE_CATEGORY = urlParams.get('cat') || 'carta';
    const PAGE_TITLE    = urlParams.get('title') || 'Carta';
    const PAGE_SUBTITLE = '';
    const PAGE_ICON     = 'fa-utensils';
    // ----------------------------------------------------------

    const ALLERGEN_NAMES = {
      gluten:'Gluten', crustaceos:'Crustáceos', huevos:'Huevos', pescado:'Pescado',
      cacahuetes:'Cacahuetes', soja:'Soja', lacteos:'Lácteos', frutos_cascara:'Frutos secos',
      apio:'Apio', mostaza:'Mostaza', sesamo:'Sésamo', azufre:'Sulfitos',
      altramuces:'Altramuces', moluscos:'Moluscos', setas:'Setas',
    };

    document.title = `${PAGE_TITLE} | ${APP_CONFIG.barName}`;
    document.getElementById('page-logo').alt = APP_CONFIG.barName;
    document.getElementById('page-title').textContent   = PAGE_TITLE;
    if (PAGE_SUBTITLE) document.getElementById('page-subtitle').textContent = PAGE_SUBTITLE;
    document.getElementById('menu-footer').textContent  = `© ${new Date().getFullYear()} ${APP_CONFIG.barName}`;

    const db      = supabase.createClient(APP_CONFIG.supabaseUrl, APP_CONFIG.supabaseKey);
    const RID     = APP_CONFIG.restaurantId;
    const loader  = document.getElementById('menu-loader');
    const noRes   = document.getElementById('no-results');
    const content = document.getElementById('menu-content');

    async function loadProducts() {
      let items = [];

      try {
        let query = db.from('menu_items').select('*')
          .eq('restaurant_id', RID)
          .eq('visible', true)
          .order('position', { ascending: true });
          
        if (urlParams.has('cat')) {
          query = query.eq('category', PAGE_CATEGORY);
        }

        const { data, error } = await query;

        if (!error && data && data.length > 0) {
          items  = data;
        }
      } catch(e) {
        console.error('Error loading products', e);
      }

      loader.remove();

      if (!items.length) {
        noRes.classList.add('visible');
        noRes.innerHTML = `<i class="fas fa-${PAGE_ICON}" aria-hidden="true"></i><p>La carta de ${PAGE_TITLE} está siendo preparada.</p>`;
        return;
      }

      renderItems(items);
      renderCategoryBar();
    }

    function renderCategoryBar() {
      const nav = document.getElementById('categories-nav');
      if (!nav) return;
      nav.innerHTML = '';
      
      const cats = APP_CONFIG.menuCategories || [];
      
      // Opción "Todas" o "Inicio" si se desea, o solo las categorías
      cats.forEach(cat => {
        const a = document.createElement('a');
        a.href = `carta.html?cat=${cat.id}&title=${encodeURIComponent(cat.label)}`;
        a.className = `cat-nav-item ${PAGE_CATEGORY === cat.id ? 'active' : ''}`;
        a.textContent = cat.label;
        nav.appendChild(a);
        
        // Autoscroll to active item
        if (PAGE_CATEGORY === cat.id) {
          setTimeout(() => a.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' }), 100);
        }
      });
    }

    function renderItems(items) {
      const showAll = !urlParams.has('cat');
      const catsMap = {};
      (APP_CONFIG.menuCategories || []).forEach(c => catsMap[c.id] = c.label);

      const groups = {};
      items.forEach(item => {
        let key = '';
        if (showAll) {
          key = catsMap[item.category] || item.category || 'Otros';
        } else {
          key = item.subcategory || '';
        }
        if (!groups[key]) groups[key] = [];
        groups[key].push(item);
      });

      Object.entries(groups).forEach(([group, groupItems]) => {
        if (group) {
          const h = document.createElement('h2');
          h.className = 'subcategory-title';
          h.textContent = group;
          content.appendChild(h);
        }

        groupItems.forEach((item, idx) => {
          const allergens = item.allergens || {};
          const badges = Object.entries(allergens)
            .filter(([k, v]) => v === true && ALLERGEN_NAMES[k])
            .map(([k]) => `<span class="allergen-badge">${ALLERGEN_NAMES[k]}</span>`)
            .join('');

          const div = document.createElement('div');
          div.className = 'menu-item';
          div.style.animationDelay = `${idx * 0.04}s`;
          div.dataset.name = item.name.toLowerCase();
          div.innerHTML = `
            ${item.image_url
              ? `<img src="${item.image_url}" alt="${item.name}" class="item-thumb" loading="lazy" width="68" height="68">`
              : `<div class="item-no-img" aria-hidden="true"><i class="fas fa-${PAGE_ICON}"></i></div>`}
            <div class="item-body">
              <div class="item-header">
                <span class="item-name">
                  ${item.name}
                  ${item.is_sugerencia ? '<span class="sugerencia-label">? Chef</span>' : ''}
                </span>
                ${parseFloat(item.price) > 0 ? `<span class="item-price">${parseFloat(item.price).toFixed(2)} €</span>` : ''}
              </div>
              ${item.info ? `<p class="item-info">${item.info}</p>` : ''}
              ${badges ? `<div class="item-allergens"><span class="allergens-label">Alérgenos:</span>${badges}</div>` : ''}
            </div>`;
          content.appendChild(div);
        });
      });

      
        
    }

    // Toggle alérgenos (persistente)
    const showAllergens = localStorage.getItem('showAllergens') === 'true';
    if (showAllergens) document.body.classList.add('show-allergens');
    const toggleBtn = document.createElement('button');
    toggleBtn.className = `toggle-allergens-btn${showAllergens ? ' active' : ''}`;
    toggleBtn.innerHTML = '<i class="fas fa-wheat-awn" aria-hidden="true"></i>';
    toggleBtn.title = showAllergens ? 'Ocultar Alérgenos' : 'Mostrar Alérgenos';
    toggleBtn.setAttribute('aria-label', 'Mostrar u ocultar alérgenos');
    toggleBtn.onclick = () => {
      const active = document.body.classList.toggle('show-allergens');
      toggleBtn.classList.toggle('active', active);
      toggleBtn.title = active ? 'Ocultar Alérgenos' : 'Mostrar Alérgenos';
      localStorage.setItem('showAllergens', active);
    };
    document.body.appendChild(toggleBtn);

    loadProducts();
  </script>
</body>
</html>
