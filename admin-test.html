<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | GastroExperience</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #f5f0e8; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-box { background: #141414; border: 1px solid #2a2a2a; border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 400px; text-align: center; }
    .login-box h1 { font-size: 1.5rem; color: #c9a84c; margin-bottom: 8px; }
    .login-box p { color: #777; font-size: 0.85rem; margin-bottom: 32px; }
    .login-box input { width: 100%; padding: 14px 16px; background: #1c1c1c; border: 1.5px solid #2a2a2a; border-radius: 9px; color: #f5f0e8; font-size: 1rem; outline: none; margin-bottom: 16px; text-align: center; }
    .login-box input:focus { border-color: #c9a84c; }
    .login-box button { width: 100%; padding: 14px; background: #c9a84c; color: #0a0a0a; border: none; border-radius: 9px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .login-box button:hover { background: #d4b55a; }
    #error { color: #f87171; font-size: 0.85rem; margin-top: 12px; display: none; }
    #dashboard { display: none; padding: 40px; }
    #dashboard h2 { color: #c9a84c; }
    .tab-nav { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; border-bottom: 1px solid #2a2a2a; padding-bottom: 16px; }
    .tab-btn { padding: 8px 16px; background: #1c1c1c; border: 1px solid #2a2a2a; border-radius: 8px; color: #777; font-size: 0.8rem; cursor: pointer; }
    .tab-btn.active { background: #c9a84c; color: #0a0a0a; border-color: #c9a84c; }
    .tab-content { display: none; background: #141414; border: 1px solid #2a2a2a; border-radius: 12px; padding: 24px; }
    .tab-content.active { display: block; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: #1c1c1c; border: 1px solid #2a2a2a; border-radius: 12px; padding: 20px; text-align: center; }
    .stat-card .num { font-size: 2rem; font-weight: 700; color: #c9a84c; }
    .stat-card .label { font-size: 0.75rem; color: #777; margin-top: 4px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 8px; text-align: left; border-bottom: 1px solid #2a2a2a; font-size: 0.85rem; }
    th { color: #777; font-size: 0.72rem; text-transform: uppercase; }
    .status-confirmed { color: #4ade80; }
    .status-pending { color: #fbbf24; }
    .action-btn { padding: 4px 10px; border-radius: 6px; border: 1px solid #2a2a2a; background: #1c1c1c; color: #f5f0e8; font-size: 0.75rem; cursor: pointer; }
    .action-btn:hover { background: #2a2a2a; }
    .action-btn.delete { color: #f87171; border-color: #f87171; }
  </style>
</head>
<body>

<div id="login" class="login-box">
  <h1>🍽️ GastroExperience</h1>
  <p id="bar-name">Panel de Administración</p>
  <input type="password" id="password" placeholder="Contraseña" onkeydown="if(event.key==='Enter')tryLogin()">
  <button onclick="tryLogin()">Entrar</button>
  <div id="error"></div>
</div>

<div id="dashboard">
  <h2 id="welcome">Panel Admin</h2>
  <div class="tab-nav">
    <button class="tab-btn active" onclick="showTab('dashboard')">Dashboard</button>
    <button class="tab-btn" onclick="showTab('reservations')">Reservas</button>
    <button class="tab-btn" onclick="showTab('menu')">Carta</button>
    <button class="tab-btn" onclick="showTab('tables')">Mesas</button>
    <button class="tab-btn" onclick="showTab('config')">Ajustes</button>
  </div>

  <div id="tab-dashboard" class="tab-content active">
    <div class="stat-grid">
      <div class="stat-card"><div class="num" id="stat-total">0</div><div class="label">Reservas totales</div></div>
      <div class="stat-card"><div class="num" id="stat-people">0</div><div class="label">Personas</div></div>
      <div class="stat-card"><div class="num" id="stat-today">0</div><div class="label">Hoy</div></div>
      <div class="stat-card"><div class="num" id="stat-confirmed">0</div><div class="label">Confirmadas</div></div>
    </div>
    <div id="reservations-list"></div>
  </div>

  <div id="tab-reservations" class="tab-content"></div>
  <div id="tab-menu" class="tab-content"><p style="color:#777;text-align:center;padding:40px;">Gestión de carta - en desarrollo</p></div>
  <div id="tab-tables" class="tab-content"><p style="color:#777;text-align:center;padding:40px;">Gestión de mesas - en desarrollo</p></div>
  <div id="tab-config" class="tab-content">
    <p style="color:#777;margin-bottom:16px;">Cambiar contraseña de administrador:</p>
    <input type="password" id="new-pass" placeholder="Nueva contraseña" style="text-align:left;">
    <button onclick="changePassword()" style="margin-top:8px;">Guardar</button>
  </div>
</div>

<script>
const SB_URL = 'https://xornvhqqjovcucpuqgoo.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhvcm52aHFxcW92Y3VjcHVxZ29vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDg3NjE1NjAsImV4cCI6MjA5MDMzNzU2MH0.VhnRj1eNsV3ykJ3a3cNNYp5gM7J7K8xH0xWx4P4y1mI';
const RID = 'demo-restaurante';
const DEFAULT_PASS = 'admin1234';

document.getElementById('bar-name').textContent = 'Panel de Administración';

async function tryLogin() {
  const pw = document.getElementById('password').value;
  const err = document.getElementById('error');
  if (!pw) { err.textContent = 'Introduce la contraseña'; err.style.display = 'block'; return; }
  if (pw !== DEFAULT_PASS) { err.textContent = 'Contraseña incorrecta'; err.style.display = 'block'; return; }
  err.style.display = 'none';
  sessionStorage.setItem('admin_ok', 'true');
  document.getElementById('login').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  await loadData();
}

function showTab(name) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.target.classList.add('active');
}

async function loadData() {
  try {
    const hdrs = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY };
    const url = SB_URL + '/rest/v1/reservations?restaurant_id=eq.' + RID + '&order=date.desc,time.desc';
    const r = await fetch(url, { headers: hdrs });
    const data = await r.json();
    updateStats(data);
    renderReservations(data);
  } catch(e) { console.error(e); }
}

function updateStats(data) {
  const today = new Date().toISOString().split('T')[0];
  const total = data.length;
  const people = data.reduce((s, r) => s + parseInt(r.people || 0), 0);
  const todayCount = data.filter(r => r.date === today).length;
  const confirmed = data.filter(r => r.status === 'confirmed').length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-people').textContent = people;
  document.getElementById('stat-today').textContent = todayCount;
  document.getElementById('stat-confirmed').textContent = confirmed;
}

function renderReservations(data) {
  const container = document.getElementById('reservations-list');
  if (!data.length) { container.innerHTML = '<p style="color:#777;text-align:center;padding:20px;">Sin reservas</p>'; return; }
  let html = '<table><thead><tr><th>Fecha</th><th>Hora</th><th>Cliente</th><th>Pax</th><th>Estado</th><th>Acciones</th></tr></thead><tbody>';
  data.slice(0, 50).forEach(r => {
    const statusClass = r.status === 'confirmed' ? 'status-confirmed' : 'status-pending';
    const statusText = r.status === 'confirmed' ? 'Confirmada' : 'Pendiente';
    const confirmBtn = r.status !== 'confirmed' 
      ? `<button class="action-btn" onclick="confirmRes('${r.id}')">✓ Confirmar</button>` 
      : '<span style="color:#4ade80;font-size:0.8rem;">✓</span>';
    html += `<tr>
      <td>${r.date}</td>
      <td><strong>${r.time}</strong></td>
      <td>${r.name}</td>
      <td>${r.people}</td>
      <td><span class="${statusClass}">${statusText}</span></td>
      <td>${confirmBtn} <button class="action-btn delete" onclick="deleteRes('${r.id}')">✕</button></td>
    </tr>`;
  });
  html += '</tbody></table>';
  container.innerHTML = html;
}

async function confirmRes(id) {
  const hdrs = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' };
  await fetch(SB_URL + '/rest/v1/reservations?id=eq.' + id, { method: 'PATCH', headers: hdrs, body: JSON.stringify({ status: 'confirmed' }) });
  await loadData();
}

async function deleteRes(id) {
  if (!confirm('¿Eliminar esta reserva?')) return;
  const hdrs = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY };
  await fetch(SB_URL + '/rest/v1/reservations?id=eq.' + id, { method: 'DELETE', headers: hdrs });
  await loadData();
}

async function changePassword() {
  const np = document.getElementById('new-pass').value;
  if (!np) return;
  alert('Cambio de contraseña en desarrollo. Mientras usa: admin1234');
}

// Auto-login si ya hay sesión
if (sessionStorage.getItem('admin_ok') === 'true') {
  document.getElementById('login').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadData();
}
</script>
</body>
</html>
